<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Browser Parameter Coverage</title>
  </head>
  <body>
    <button id="load">Load</button>
    <button id="clear-event">Clear Event</button>
    <a id="download-link" download="coverage-download.txt" href="data:text/plain;charset=utf-8,coverage%20download%20ok%0A">Download</a>
    <input id="editable" value="ready" />
    <p id="status">idle</p>
    <p id="network">none</p>
    <script>
      window.readyFlag = false;
      setTimeout(() => {
        window.readyFlag = true;
        document.getElementById("status").textContent = "ready";
      }, 50);

      document.getElementById("load").addEventListener("click", async () => {
        const response = await fetch("https://fixture.local/coverage");
        const data = await response.json();
        document.getElementById("network").textContent = data.message;
      });

      document.getElementById("clear-event").addEventListener("click", () => {
        console.log("clear event clicked");
      });
    </script>
  </body>
</html>
